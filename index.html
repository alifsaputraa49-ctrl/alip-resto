<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALIP RESTO - Smart System v4 (Firebase Realtime)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @media print {
            body { background: white; color: black; }
            .no-print { display: none !important; }
            #area-cetak-nota { 
                display: block !important;
                width: 100%;
                max-width: 80mm;
                font-family: 'Courier New', Courier, monospace;
                font-size: 12px;
                line-height: 1.4;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
    
    <div class="max-w-lg mx-auto p-4 no-print">
        <header class="text-center py-6">
            <h1 class="text-4xl font-black text-orange-500">ALIP RESTO</h1>
            <p class="text-gray-500 text-sm">Sistem Kasir & Pemesanan Terintegrasi</p>
        </header>

        <div id="view-landing" class="space-y-4 my-8">
            <div class="bg-white p-6 rounded-3xl shadow-sm border text-center">
                <button onclick="switchHalaman('user')" class="w-full p-4 bg-orange-500 text-white rounded-2xl font-bold mb-3 shadow-lg">Masuk Sebagai Pelanggan</button>
                <button onclick="masukSebagaiAdmin()" class="w-full p-4 bg-gray-900 text-white rounded-2xl font-bold shadow-lg">Masuk Sebagai Admin</button>
            </div>
        </div>

        <div id="view-user" class="hidden space-y-4">
            <button onclick="switchHalaman('landing')" class="text-xs font-bold"><i class="fa-solid fa-arrow-left"></i> Kembali</button>
            <input type="text" id="nama" placeholder="Nama Anda" class="w-full p-3 border rounded-xl text-sm">
            <input type="text" id="meja" placeholder="No. Meja" class="w-full p-3 border rounded-xl text-sm">
            <div id="user-menu-list" class="bg-white p-5 rounded-2xl border"></div>
            <div class="flex gap-2">
                <button onclick="pilihMetode('Tunai')" id="btn-tunai" class="flex-1 p-3 border-2 rounded-xl font-bold text-xs border-orange-500 bg-orange-50 text-orange-600">Tunai</button>
                <button onclick="pilihMetode('QRIS')" id="btn-qris" class="flex-1 p-3 border-2 rounded-xl font-bold text-xs border-gray-200 text-gray-400">QRIS</button>
            </div>
            <button onclick="submitOrder()" class="w-full bg-orange-500 text-white p-4 rounded-xl font-bold">Kirim Pesanan</button>
        </div>

        <div id="view-nota" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-3xl border shadow-md relative text-center">
                <div id="badge-lunas" class="hidden absolute top-4 right-4 bg-green-600 text-white font-black text-xs px-3 py-1 rounded rotate-12">LUNAS</div>
                <h3 class="font-black text-xl mb-4">NOTA DIGITAL</h3>
                <div id="qrcode-container" class="flex justify-center p-4"></div>
                <div class="text-left text-xs space-y-1 mt-4 border-t pt-4">
                    <p>Status: <span id="nota-status" class="font-bold"></span></p>
                    <p>ID Order: <span id="nota-id" class="font-bold"></span></p>
                </div>
                <button onclick="keluarHalamanNota()" class="w-full mt-6 bg-gray-900 text-white py-3 rounded-xl font-bold">Tutup Nota & Kembali</button>
            </div>
        </div>

        <div id="view-admin" class="hidden space-y-4">
            <div class="grid grid-cols-2 gap-2 bg-gray-200 p-1 rounded-xl">
                <button onclick="switchTabAdmin('pesanan')" id="tab-btn-pesanan" class="py-2.5 rounded-lg text-xs font-bold bg-white">Pesanan Masuk</button>
                <button onclick="switchTabAdmin('menu')" id="tab-btn-menu" class="py-2.5 rounded-lg text-xs font-bold text-gray-500">Kelola Menu</button>
            </div>
            <div id="tab-konten-pesanan" class="space-y-4">
                <div id="scanner-reader" class="rounded-lg border"></div>
                <button onclick="mulaiScanner()" class="w-full p-2 bg-blue-600 text-white rounded-lg text-xs font-bold">Aktifkan Scanner</button>
                <div id="list-pesanan" class="space-y-3"></div>
            </div>
            <div id="tab-konten-menu" class="hidden space-y-4">
                <form onsubmit="simpanMenuBaru(event)" class="space-y-2 bg-white p-4 rounded-xl border">
                    <input type="text" id="menu-nama" required placeholder="Nama" class="w-full p-2 border rounded-xl text-xs">
                    <input type="number" id="menu-harga" required placeholder="Harga" class="w-full p-2 border rounded-xl text-xs">
                    <input type="number" id="menu-stok" required placeholder="Stok" class="w-full p-2 border rounded-xl text-xs">
                    <input type="file" id="menu-file-input" accept="image/*" onchange="previewDanKonversiGambar(this)">
                    <button type="submit" class="w-full bg-orange-500 text-white py-2 rounded-xl text-xs font-bold">Simpan Menu</button>
                </form>
                <div id="admin-stok-list" class="space-y-2"></div>
            </div>
        </div>
    </div>
    <div id="area-cetak-nota" style="display: none;"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA1...",
            authDomain: "alip-resto.firebaseapp.com",
            databaseURL: "https://studio-2624030349-b1866-default-rtdb.firebaseio.com/",
            projectId: "alip-resto",
            storageBucket: "alip-resto.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:abcdef"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedMetode = 'Tunai', currentFirebaseOrderKey = null, keranjangBelanja = {}, listMenuData = [], stringBase64Gambar = "";

        function switchHalaman(view) {
            document.querySelectorAll('div[id^="view-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('view-' + view).classList.remove('hidden');
        }

        function switchTabAdmin(tab) {
            document.getElementById('tab-konten-pesanan').classList.toggle('hidden', tab !== 'pesanan');
            document.getElementById('tab-konten-menu').classList.toggle('hidden', tab !== 'menu');
            if(tab === 'pesanan') listenAdminOrders(); else listenStokMenuDiAdmin();
        }

        function masukSebagaiAdmin() { if (prompt("Password Admin:") === "@/if$@putr@") switchHalaman('admin'); else alert("Salah!"); }

        function pilihMetode(m) {
            selectedMetode = m;
            document.getElementById('btn-tunai').className = (m === 'Tunai') ? 'flex-1 p-3 border-2 rounded-xl font-bold text-xs border-orange-500 bg-orange-50 text-orange-600' : 'flex-1 p-3 border-2 rounded-xl font-bold text-xs border-gray-200 text-gray-400';
            document.getElementById('btn-qris').className = (m === 'QRIS') ? 'flex-1 p-3 border-2 rounded-xl font-bold text-xs border-orange-500 bg-orange-50 text-orange-600' : 'flex-1 p-3 border-2 rounded-xl font-bold text-xs border-gray-200 text-gray-400';
        }

        function submitOrder() {
            const nama = document.getElementById('nama').value, meja = document.getElementById('meja').value;
            if (!nama || !meja) return alert("Lengkapi data!");
            const orderData = { id: Math.floor(1000 + Math.random() * 9000), nama, meja, metode: selectedMetode, status: selectedMetode === 'QRIS' ? 'Menunggu Konfirmasi' : 'Belum Bayar', sajian: 'Memasak', timestamp: firebase.database.ServerValue.TIMESTAMP };
            const ref = db.ref('orders').push();
            ref.set(orderData).then(() => {
                currentFirebaseOrderKey = ref.key;
                tampilkanNotaDigitalPelanggan(orderData);
            });
        }

        function tampilkanNotaDigitalPelanggan(order) {
            switchHalaman('nota');
            document.getElementById('nota-id').innerText = "#" + order.id;
            document.getElementById('qrcode-container').innerHTML = "";
            new QRCode(document.getElementById('qrcode-container'), { text: currentFirebaseOrderKey, width: 150, height: 150 });
            
            db.ref('orders/' + currentFirebaseOrderKey).on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('nota-status').innerText = data.status;
                    document.getElementById('badge-lunas').classList.toggle('hidden', data.status !== 'Lunas');
                }
            });
        }

        function listenAdminOrders() {
            db.ref('orders').on('value', (snapshot) => {
                let arr = [];
                snapshot.forEach(child => arr.push({ key: child.key, ...child.val() }));
                arr.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                document.getElementById('list-pesanan').innerHTML = arr.map(o => `
                    <div class="bg-white p-4 rounded-xl border">
                        <p class="font-bold">#${o.id} - ${o.nama} (${o.metode})</p>
                        <p class="text-[10px]">Status: <b>${o.status}</b></p>
                        ${o.status !== 'Lunas' ? `<button onclick="setLunas('${o.key}')" class="bg-green-600 text-white px-2 py-1 rounded text-[10px] font-bold">VERIFIKASI LUNAS</button>` : ''}
                        <button onclick="setPesananSelesai('${o.key}')" class="bg-orange-500 text-white px-2 py-1 rounded text-[10px] font-bold ml-1">SELESAI</button>
                    </div>
                `).join('');
            });
        }

        function setLunas(key) { db.ref('orders/' + key).update({ status: 'Lunas' }); }
        function setPesananSelesai(key) { db.ref('orders/' + key).update({ sajian: 'Selesai' }); }
        function keluarHalamanNota() { if(currentFirebaseOrderKey) db.ref('orders/' + currentFirebaseOrderKey).off(); switchHalaman('landing'); }
        
        function previewDanKonversiGambar(input) {
            const reader = new FileReader();
            reader.onload = (e) => { stringBase64Gambar = e.target.result; };
            reader.readAsDataURL(input.files[0]);
        }

        function simpanMenuBaru(e) {
            e.preventDefault();
            db.ref('menu').push({ nama: document.getElementById('menu-nama').value, harga: document.getElementById('menu-harga').value, stok: document.getElementById('menu-stok').value, gambar: stringBase64Gambar });
            alert("Menu tersimpan!");
        }

        function listenStokMenuDiAdmin() {
            db.ref('menu').on('value', (snapshot) => {
                let html = "";
                snapshot.forEach(c => { const m = c.val(); html += `<div class="bg-white p-2 rounded border text-xs">${m.nama} - Stok: ${m.stok} <button onclick="hapusMenu('${c.key}')" class="text-red-500 font-bold ml-2">X</button></div>`; });
                document.getElementById('admin-stok-list').innerHTML = html;
            });
        }
        
        function hapusMenu(key) { db.ref('menu/' + key).remove(); }
        function mulaiScanner() { /* Logic Scanner Anda */ }
        function cetakNotaFisik(o) { window.print(); }
    </script>
</body>
</html>
