<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALIP RESTO - Sistem Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    
    <div class="max-w-lg mx-auto p-4">
        <header class="text-center py-8">
            <h1 class="text-4xl font-black text-orange-500">ALIP RESTO</h1>
            <p class="text-gray-500 text-sm">Sistem Pemesanan Digital</p>
        </header>

        <div id="section-user" class="bg-white p-6 rounded-3xl shadow-sm border">
            <input type="text" id="nama" placeholder="Nama Pelanggan" class="w-full p-3 border rounded-xl mb-3">
            <input type="text" id="meja" placeholder="Nomor Meja" class="w-full p-3 border rounded-xl mb-4">
            
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="pilihMetode('Tunai')" id="btn-tunai" class="p-3 border-2 rounded-xl font-bold">Tunai</button>
                <button onclick="pilihMetode('QRIS')" id="btn-qris" class="p-3 border-2 rounded-xl font-bold">DANA (QRIS)</button>
            </div>
            <button onclick="submitOrder()" class="w-full bg-orange-500 text-white py-4 rounded-xl font-black">KONFIRMASI PESANAN</button>
        </div>

        <div id="section-admin" class="hidden">
            <h2 class="font-bold text-lg mb-4">Dashboard Kasir</h2>
            <div id="list-pesanan" class="space-y-3"></div>
        </div>

        <button onclick="loginAdmin()" class="mt-10 w-full text-gray-400 text-xs">Admin Login</button>
    </div>

    <script>
        let selectedMetode = 'Tunai';

        function pilihMetode(m) {
            selectedMetode = m;
            document.getElementById('btn-tunai').className = (m === 'Tunai') ? 'p-3 border-2 border-orange-500 rounded-xl font-bold' : 'p-3 border-2 rounded-xl font-bold';
            document.getElementById('btn-qris').className = (m === 'QRIS') ? 'p-3 border-2 border-orange-500 rounded-xl font-bold' : 'p-3 border-2 rounded-xl font-bold';
        }

        async function submitOrder() {
            const data = {
                nama: document.getElementById('nama').value,
                meja: document.getElementById('meja').value,
                metode: selectedMetode,
                status: (selectedMetode === 'QRIS') ? 'Lunas' : 'Belum Bayar'
            };

            const res = await fetch('api.php?action=add_order', { method: 'POST', body: JSON.stringify(data) }).then(r => r.json());
            
            if(selectedMetode === 'QRIS') {
                window.location.href = "https://link.dana.id/qr/628XXXXX"; // Ganti No. HP
            } else {
                alert("Pesanan berhasil! ID: " + res.id);
            }
        }

        async function loadAdmin() {
            const res = await fetch('api.php?action=get_orders').then(r => r.json());
            document.getElementById('list-pesanan').innerHTML = res.map(o => `
                <div class="bg-white p-4 rounded-xl flex justify-between items-center shadow-sm">
                    <div>
                        <p class="font-bold">${o.nama} - Meja ${o.meja}</p>
                        <p class="text-xs ${o.status === 'Lunas' ? 'text-green-600' : 'text-red-500'} font-bold">${o.status}</p>
                    </div>
                    ${o.status === 'Belum Bayar' ? `<button onclick="setLunas(${o.id})" class="bg-blue-600 text-white px-3 py-1 rounded text-xs">SET LUNAS</button>` : ''}
                </div>
            `).join('');
        }

        function setLunas(id) { fetch('api.php?action=update_status&id=' + id).then(() => loadAdmin()); }
        function loginAdmin() { if(prompt("Password:") === "123") { document.getElementById('section-user').classList.add('hidden'); document.getElementById('section-admin').classList.remove('hidden'); loadAdmin(); } }
    </script>
</body>
</html>
